<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="form-card">
            <h1>Create Account</h1>
            <form id="signup-form" novalidate>
                <div class="form-group" id="group-name">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="First and last name">
                    <span class="error-message" id="error-name"></span>
                </div>

                <div class="form-group" id="group-email">
                    <label for="email">Email address</label>
                    <input type="text" id="email" name="email" placeholder="name@domain.com">
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="form-group" id="group-password">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters">
                    <span class="error-message" id="error-password"></span>
                    <div class="strength-checklist">
                        <div class="check-item" id="check-length">Min 8 characters</div>
                        <div class="check-item" id="check-number">At least 1 number</div>
                        <div class="check-item" id="check-special">At least 1 special character</div>
                    </div>
                </div>

                <div class="form-group checkbox-group" id="group-terms">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                    <span class="error-message" id="error-terms"></span>
                </div>

                <button type="submit" id="submit-btn">Sign Up</button>
            </form>
            <div id="success-banner">Account created successfully!</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
